name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit run --all-files --show-diff-on-failure

  test-core:
    name: Core Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run core tests
        run: |
          pytest \
            tests/core \
            tests/diagnostics/test_bands.py \
            tests/diagnostics/test_common.py \
            tests/telemetry/test_distributed.py \
            tests/telemetry/test_msgpack.py \
            tests/telemetry/test_sender_sequence.py \
            -q

  test-integration:
    name: Integration Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run integration tests
        run: |
          pytest \
            tests/runtime/test_sampler_registry.py \
            tests/runtime/test_telemetry_publisher.py \
            tests/reporting/compare \
            -q
